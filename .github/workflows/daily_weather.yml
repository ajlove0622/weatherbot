name: Daily Weather Alarm

on:
  schedule:
    # POSIX cron ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ (UTC ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝฬนวท๏ฟฝ ๏ฟฝัฑ๏ฟฝ๏ฟฝรฐ๏ฟฝ -9๏ฟฝรฐ๏ฟฝ)
    # ๏ฟฝฦท๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝัฑ๏ฟฝ ๏ฟฝรฐ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ 7๏ฟฝ๏ฟฝ 0๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
    - cron: '0 21 * * *'
  workflow_dispatch: # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝุบ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝฦฐ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ

jobs:
  build:
    runs-on: ubuntu-latest # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ศฏ๏ฟฝ๏ฟฝ (๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # ๏ฟฝ๏ฟฝ ๏ฟฝฺตๅธฆ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run Weather Bot
      env: # ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ Secrets๏ฟฝ๏ฟฝ ศฏ๏ฟฝๆบฏ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
        KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
        KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      run: python weather_bot.py

